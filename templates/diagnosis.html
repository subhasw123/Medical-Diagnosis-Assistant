<!DOCTYPE html>
<html>
<head>
    <title>Diagnosis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .symptom-search {
            position: relative;
            margin-bottom: 15px;
        }
        .symptom-search input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .symptom-list {
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 250px;
            overflow-y: auto;
            background: #f9f9f9;
        }
        .symptom-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .symptom-item:last-child {
            border-bottom: none;
        }
        .symptom-item input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
            width: auto;
        }
        .symptom-item label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
            flex: 1;
        }
        .selected-symptoms {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 4px;
            min-height: 40px;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .symptom-tag {
            background: #2196F3;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .symptom-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }
        button[type="submit"] {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button[type="submit"]:hover {
            background: #45a049;
        }
        .no-results {
            padding: 10px;
            text-align: center;
            color: #999;
        }
        .results-container {
    margin-top: 30px;
}

        .prediction-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .prediction-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .progress {
            width: 100%;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
        }

        #result-container {
    margin-top: 30px;
}

    .prediction-card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .progress {
        width: 100%;
        height: 24px;
        background: #eee;
        border-radius: 20px;
        overflow: hidden;
        margin: 10px 0;
    }

    .progress-bar {
        height: 100%;
        background: #4CAF50;
        color: white;
        text-align: center;
        line-height: 24px;
    }



    </style>
</head>
<body>

<h1>Medical Diagnosis Assistant</h1>

<form id="diagnosis-form">

    <div class="form-group">
        <label>Full Name:</label>
        <input
            type="text"
            name="full_name"
            placeholder="Full Name"
            required
        >
    </div>

    <div class="form-group">
        <label>Age:</label>
        <input
            type="number"
            name="age"
            placeholder="Age"
            required
        >
    </div>

    <div class="form-group">
        <label>Gender:</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="form-group">
        <label>Select Symptoms:</label>
        <div class="symptom-search">
            <input
                type="text"
                id="symptom-search"
                placeholder="Search symptoms..."
            >
        </div>
        <div class="symptom-list" id="symptom-list">
            <!-- Symptoms will be populated here -->
        </div>
    </div>

    <div class="form-group">
        <label>Selected Symptoms:</label>
        <div class="selected-symptoms" id="selected-symptoms">
            <span style="color: #999;">No symptoms selected</span>
        </div>
        <input type="hidden" name="symptoms" id="symptoms-input">
    </div>

    <button type="submit">
        Diagnose
    </button>
    <br><br>

</form>
<hr style="margin:40px 0;">

<div id="result-container"></div>

<script src="/static/js/diagnosis.js"></script>
<div id="diagnosis-results"></div>

<hr>

<h2>Medical AI Chatbot</h2>

<div id="chat-box"
     style="
        height:300px;
        overflow-y:auto;
        border:1px solid #ddd;
        padding:10px;
        margin-bottom:10px;
        background:#f9f9f9;
     ">
</div>

<input
    type="text"
    id="chat-input"
    placeholder="Ask a medical question..."
    style="width:80%;padding:10px;"
>

<button
    type="button"
    onclick="sendMessage()"
>
    Send
</button>

<nav class="navbar">
    <div class="logo">
        <h2>🏥 MedAI</h2>
        <p>AI-Powered Medical Diagnosis Assistant</p>
    </div>
</nav>

</body>
</html>
