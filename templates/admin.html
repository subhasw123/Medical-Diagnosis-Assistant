<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI – Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --teal-500: #00b3b3;
            --cyan-500: #06b6d4;
            --dark-bg: #060d1f;
            --card-bg: rgba(255,255,255,0.06);
            --card-border: rgba(255,255,255,0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.65);
            --text-muted: rgba(255,255,255,0.4);
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-orbs::before {
            content: ''; position: absolute;
            width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,179,179,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        .bg-orbs::after {
            content: ''; position: absolute;
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(30,64,175,0.18) 0%, transparent 70%);
            bottom: -100px; right: -100px;
        }

        .login-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px; padding: 24px;
        }
        .login-logo {
            text-align: center; margin-bottom: 36px;
        }
        .logo-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--teal-500), var(--cyan-500));
            border-radius: 18px; font-size: 1.7rem;
            box-shadow: 0 0 30px rgba(0,179,179,0.4);
            margin-bottom: 14px;
        }
        .login-logo h1 { font-size: 1.8rem; font-weight: 800; }
        .login-logo p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-card h2 {
            font-size: 1.2rem; font-weight: 700;
            margin-bottom: 6px;
        }
        .login-card p { font-size: 0.83rem; color: var(--text-muted); margin-bottom: 28px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 8px; letter-spacing: .04em;
        }
        .input-wrap { position: relative; }
        .input-wrap .inp-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.95rem;
        }
        .form-group input {
            width: 100%; padding: 13px 16px 13px 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary); font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none; transition: all 0.3s;
        }
        .form-group input::placeholder { color: var(--text-muted); }
        .form-group input:focus {
            border-color: rgba(0,179,179,0.5);
            background: rgba(0,179,179,0.05);
        }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--teal-500), var(--cyan-500));
            border: none; border-radius: 12px;
            color: #fff; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,179,179,0.35);
            margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,179,179,0.5); }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            font-size: 0.83rem; color: var(--text-muted); text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--text-primary); }

        .hint {
            background: rgba(0,179,179,0.07);
            border: 1px solid rgba(0,179,179,0.15);
            border-radius: 10px; padding: 12px 16px;
            font-size: 0.78rem; color: var(--text-muted);
            margin-top: 20px; text-align: center; line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="bg-orbs"></div>
<div class="login-wrapper">
    <div class="login-logo">
        <div class="logo-icon">💊</div>
        <h1>MedAI</h1>
        <p>AI-Powered Medical Diagnosis Platform</p>
    </div>
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <p>Secure access to the admin dashboard</p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="inp-icon">👤</span>
                    <input type="text" name="username" placeholder="Enter username" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="inp-icon">🔑</span>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Sign In to Dashboard</button>
        </form>
        <div class="hint">🛡️ Default credentials: <strong>admin</strong> / <strong>admin123</strong></div>
    </div>
    <a href="/" class="back-link">← Back to MedAI Home</a>
</div>
</body>
</html>
