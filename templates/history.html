<!DOCTYPE html>
<html>
<head>
    <title>Diagnosis History</title>

    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:left;
        }

        th{
            background:#4CAF50;
            color:white;
        }

        tr:nth-child(even){
            background:#f5f5f5;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        a{
            text-decoration:none;
            background:#4CAF50;
            color:white;
            padding:10px 15px;
            border-radius:5px;
        }
    </style>

</head>
<body>

<div class="header">
    <h1>Diagnosis History</h1>

    <a href="/">
        New Diagnosis
    </a>
</div>

<table>

    <tr>
        <th>Patient</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Disease</th>
        <th>Confidence</th>
        <th>Date</th>
    </tr>

    {% for row in rows %}

    <tr>

        <td>{{ row.full_name }}</td>

        <td>{{ row.age }}</td>

        <td>{{ row.gender }}</td>

        <td>{{ row.disease }}</td>

        <td>{{ row.confidence }}%</td>

        <td>{{ row.diagnosis_date }}</td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
